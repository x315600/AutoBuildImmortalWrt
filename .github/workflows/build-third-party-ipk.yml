name: build-third-party-ipk

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3 python3-distutils rsync unzip zlib1g-dev file wget curl

      - name: Clone ImmortalWrt SDK
        run: |
          mkdir -p /tmp/sdk
          cd /tmp/sdk
          wget -O sdk.tar.xz "https://downloads.immortalwrt.org/releases/24.10.5/targets/armsr/armv8/immortalwrt-sdk-24.10.5-armsr-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.xz"
          tar -xf sdk.tar.xz
          mv immortalwrt-sdk-* sdkdir

      - name: Prepare third-party source
        run: |
          mkdir -p /tmp/third_party
          git clone --depth=1 https://github.com/timsaya/luci-app-bandix /tmp/third_party/luci-app-bandix
          git clone --depth=1 https://github.com/sirpdboy/luci-app-taskplan /tmp/third_party/luci-app-taskplan
          TASKPLAN_MENU="/tmp/third_party/luci-app-taskplan/luci-app-taskplan/root/usr/share/luci/menu.d/luci-app-taskplan.json"
          if [ -f "$TASKPLAN_MENU" ]; then
            sed -i 's#admin/control#admin/services#g' "$TASKPLAN_MENU"
          fi

      - name: Inject packages into SDK
        run: |
          SDK=/tmp/sdk/sdkdir
          mkdir -p $SDK/package/custom
          cp -r /tmp/third_party/luci-app-bandix/luci-app-bandix $SDK/package/custom/luci-app-bandix
          cp -r /tmp/third_party/luci-app-taskplan/luci-app-taskplan $SDK/package/custom/luci-app-taskplan

      - name: Update feeds
        run: |
          SDK=/tmp/sdk/sdkdir
          cd $SDK
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure packages
        run: |
          SDK=/tmp/sdk/sdkdir
          cd $SDK
          cat >> .config <<'EOC'
          CONFIG_PACKAGE_luci-app-bandix=m
          CONFIG_PACKAGE_bandix=m
          CONFIG_PACKAGE_luci-i18n-bandix-zh-cn=m
          CONFIG_PACKAGE_luci-app-taskplan=m
          CONFIG_PACKAGE_luci-i18n-taskplan-zh-cn=m
          EOC
          make defconfig

      - name: Build ipk
        run: |
          SDK=/tmp/sdk/sdkdir
          cd $SDK
          make package/luci-app-bandix/compile V=s || true
          make package/luci-app-taskplan/compile V=s || true

      - name: Collect ipk
        run: |
          mkdir -p output
          find /tmp/sdk/sdkdir/bin/packages -name '*bandix*.ipk' -exec cp -f {} output/ \; || true
          find /tmp/sdk/sdkdir/bin/packages -name '*taskplan*.ipk' -exec cp -f {} output/ \; || true
          ls -lah output

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: third-party-ipk
          path: output/*.ipk
          if-no-files-found: warn
